<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Spatial Translator App</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        /* 3D Isometric / Cyber-inspired Background */
        body { 
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); 
            color: #ffffff; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
            align-items: center;
            perspective: 1000px; /* Crucial for 3D depth perception */
            padding: 10px;
        }
        
        /* 3D Floating Header */
        .app-bar { 
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            width: 100%; 
            max-width: 450px; 
            padding: 15px 20px; 
            border-radius: 16px;
            margin-top: 10px;
            margin-bottom: 20px;
            display: flex; 
            align-items: center; 
            gap: 15px; 
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255,255,255,0.2);
            transform: translateZ(20px);
        }
        .app-bar h1 { font-size: 20px; font-weight: 600; color: #fff; letter-spacing: 0.5px; }

        .app-container { 
            width: 100%; 
            max-width: 450px; 
            display: flex; 
            flex-direction: column; 
            gap: 24px; 
            transform-style: preserve-3d;
        }

        /* 3D Language Selector Control */
        .lang-selector-bar { 
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border-radius: 16px; 
            padding: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            box-shadow: 0 12px 24px rgba(0,0,0,0.4), inset 0 2px 4px rgba(255,255,255,0.05); 
            border: 1px solid #334155;
            transform: rotateX(5deg);
        }
        select { 
            border: none; 
            background: #1e293b; 
            font-size: 14px; 
            font-weight: 600; 
            color: #38bdf8; 
            padding: 10px; 
            border-radius: 10px;
            cursor: pointer; 
            outline: none; 
            width: 42%; 
            text-align: center;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.1);
        }
        
        /* 3D Beveled Buttons */
        .swap-btn { 
            background: linear-gradient(135deg, #3b82f6, #1d4ed8); 
            border: none; 
            font-size: 16px; 
            color: white;
            cursor: pointer; 
            padding: 8px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 40px; 
            height: 40px; 
            box-shadow: 0 4px 0 #1e40af, 0 6px 10px rgba(0,0,0,0.4);
            transform: translateY(-2px);
            transition: all 0.1s ease;
        }
        .swap-btn:active { 
            transform: translateY(2px);
            box-shadow: 0 0px 0 #1e40af, 0 2px 5px rgba(0,0,0,0.4);
        }

        /* Claymorphism & Extruded Layering for Text Blocks */
        .card { 
            background: linear-gradient(145deg, #1e293b, #111827); 
            border-radius: 20px; 
            border: 1px solid #334155; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            box-shadow: 0 15px 30px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.1);
            transform: rotateX(5deg) translateZ(10px);
            transition: transform 0.3s ease;
        }
        
        textarea { 
            width: 100%; 
            height: 110px; 
            border: none; 
            resize: none; 
            font-size: 18px; 
            color: #f8fafc; 
            background: transparent;
            outline: none; 
            line-height: 1.5; 
        }
        .char-count { font-size: 12px; color: #64748b; text-align: right; margin-top: 5px; }

        /* The Ultimate 3D Push Button */
        .translate-main-btn { 
            background: linear-gradient(135deg, #10b981, #059669); 
            color: white; 
            border: none; 
            padding: 16px; 
            font-size: 18px; 
            font-weight: 700; 
            border-radius: 16px; 
            cursor: pointer; 
            width: 100%; 
            transform: translateY(-4px) rotateX(5deg);
            box-shadow: 0 6px 0 #047857, 0 12px 20px rgba(0,0,0,0.4);
            transition: all 0.1s ease;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .translate-main-btn:active { 
            transform: translateY(2px) rotateX(5deg);
            box-shadow: 0 0px 0 #047857, 0 4px 10px rgba(0,0,0,0.4);
        }

        /* Output Card with Deep Counter-Sunk Inner Shadow */
        .output-card { 
            background: linear-gradient(145deg, #0f172a, #1e293b); 
            border: 1px solid #1e293b;
        }
        .output-text { 
            font-size: 18px; 
            color: #38bdf8; 
            min-height: 80px; 
            white-space: pre-wrap; 
            line-height: 1.5; 
        }
        
        .card-actions { 
            display: flex; 
            justify-content: flex-end; 
            gap: 15px; 
            margin-top: 12px; 
            border-top: 1px solid #334155; 
            padding-top: 12px; 
        }
        
        .action-icon-btn { 
            background: #334155; 
            border: none; 
            font-size: 16px; 
            cursor: pointer; 
            padding: 8px; 
            border-radius: 10px; 
            width: 42px; 
            height: 42px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: #fff; 
            box-shadow: 0 3px 0 #1e293b;
            transform: translateY(-2px);
            transition: all 0.1s ease;
        }
        .action-icon-btn:active {
            transform: translateY(1px);
            box-shadow: 0 0px 0 #1e293b;
        }
    </style>
</head>
<body>

    <div class="app-bar">
        <svg viewBox="0 0 24 24" width="26" height="26" fill="#38bdf8"><path d="M12.87 15.07l-2.54-2.51.03-.03c1.74-1.94 2.98-4.17 3.71-6.53H17V4h-7V2H8v2H1v2h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12zm-2.62 7l1.62-4.33L19.12 17h-3.24z"/></svg>
        <h1>Spatial Translator</h1>
    </div>

    <div class="app-container">
        
        <div class="lang-selector-bar">
            <select id="srcLang">
                <option value="autodetect">🌐 Auto-Detect</option>
                <option value="en" selected>English</option>
                <option value="es">Spanish</option>
                <option value="fr">French</option>
                <option value="hi">Hindi</option>
                <option value="te">Telugu</option>
                <option value="ar">Arabic</option>
                <option value="bn">Bengali</option>
                <option value="zh">Chinese</option>
                <option value="de">German</option>
                <option value="el">Greek</option>
                <option value="gu">Gujarati</option>
                <option value="it">Italian</option>
                <option value="ja">Japanese</option>
                <option value="kn">Kannada</option>
                <option value="ko">Korean</option>
                <option value="ml">Malayalam</option>
                <option value="mr">Marathi</option>
                <option value="pt">Portuguese</option>
                <option value="pa">Punjabi</option>
                <option value="ru">Russian</option>
                <option value="ta">Tamil</option>
                <option value="ur">Urdu</option>
            </select>

            <button class="swap-btn" onclick="swapLanguages()">🔁</button>

            <select id="tgtLang">
                <option value="es" selected>Spanish</option>
                <option value="en">English</option>
                <option value="fr">French</option>
                <option value="hi">Hindi</option>
                <option value="te">Telugu</option>
                <option value="ar">Arabic</option>
                <option value="bn">Bengali</option>
                <option value="zh">Chinese</option>
                <option value="de">German</option>
                <option value="el">Greek</option>
                <option value="gu">Gujarati</option>
                <option value="it">Italian</option>
                <option value="ja">Japanese</option>
                <option value="kn">Kannada</option>
                <option value="ko">Korean</option>
                <option value="ml">Malayalam</option>
                <option value="mr">Marathi</option>
                <option value="pt">Portuguese</option>
                <option value="pa">Punjabi</option>
                <option value="ru">Russian</option>
                <option value="ta">Tamil</option>
                <option value="ur">Urdu</option>
            </select>
        </div>

        <div class="card">
            <textarea id="sourceText" placeholder="Tap to type message..." oninput="updateCharCount()"></textarea>
            <div class="char-count" id="charCount">0 / 1000</div>
        </div>

        <button class="translate-main-btn" onclick="translateText()">Translate Text</button>

        <div class="card output-card">
            <div class="output-text" id="translatedOutput">System standing by...</div>
            
            <div class="card-actions">
                <button class="action-icon-btn" onclick="copyText()">📋</button>
                <button class="action-icon-btn" onclick="speakText()">🔊</button>
            </div>
        </div>

    </div>

<script>
    function updateCharCount() {
        const text = document.getElementById('sourceText').value;
        document.getElementById('charCount').innerText = `${text.length} / 1000`;
    }

    function swapLanguages() {
        const srcSelect = document.getElementById('srcLang');
        const tgtSelect = document.getElementById('tgtLang');
        if(srcSelect.value === 'autodetect') return;
        const temp = srcSelect.value;
        srcSelect.value = tgtSelect.value;
        tgtSelect.value = temp;
    }

    async function translateText() {
        const text = document.getElementById('sourceText').value.trim();
        let srcLang = document.getElementById('srcLang').value;
        const tgtLang = document.getElementById('tgtLang').value;
        const outputDiv = document.getElementById('translatedOutput');

        if (!text) {
            outputDiv.innerText = "Please enter some text.";
            return;
        }

        outputDiv.innerText = "Processing translation engine...";
        outputDiv.style.color = "#64748b";

        if(srcLang === "autodetect") srcLang = ""; 

        try {
            const response = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${srcLang || 'auto'}|${tgtLang}`);
            const data = await response.json();
            
            if(data.responseData) {
                outputDiv.innerText = data.responseData.translatedText;
                outputDiv.style.color = "#38bdf8";
            } else {
                outputDiv.innerText = "Engine parsing error. Retry.";
            }
        } catch (error) {
            outputDiv.innerText = "Network dropout. Check connectivity.";
            console.error(error);
        }
    }

    function copyText() {
        const text = document.getElementById('translatedOutput').innerText;
        if(text && text !== "System standing by..." && text !== "Processing translation engine...") {
            navigator.clipboard.writeText(text);
            alert("Copied to clipboard!");
        }
    }

    function speakText() {
        const text = document.getElementById('translatedOutput').innerText;
        const tgtLang = document.getElementById('tgtLang').value;
        if(text && text !== "System standing by...") {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = tgtLang;
            window.speechSynthesis.speak(utterance);
        }
    }
</script>
</body>
</html>
